name: Sync Latest Xray Binaries

on:
  schedule:
    - cron: '0 9 1 * *' 
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

permissions:
  contents: write # Grants permission to push binaries back to the repository

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Binary Directory
        run: ｜
          mkdir -p bin_dist
        

      - name: Download and Extract AMD64 (x86_64) Binary
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip -d binary_amd64
          cp binary_amd64/* bin_dist/
          mv bin_dist/xray bin_dist/xray_amd64

      - name: Download and Extract ARM64 (aarch64) Binary
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-arm64-v8a.zip 
          unzip Xray-linux-arm64-v8a.zip -d binary_arm64
          cp binary_arm64/xray bin_dist/
          mv bin_dist/xray bin_dist/xray_arm64

      # - name: Commit and Push Changes
        # run: |
          # git config --global user.name "github-actions[bot]"
          # git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # git add -A
          
          # # Only commit and push if there are changes to avoid failing the workflow
          # if git diff --cached --quiet; then
          #   echo "No new Xray changes detected."
          # else
          #   git commit -m "Update Xray binaries to latest release"
          #   git push
          # fi

      - name: Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Xray Binaries
          body: "Automatic sync with latest Xray-core release."
          files: |
            bin_dist/xray*
            bin_dist/geo*.dat
            
          fail_on_unmatched_files: true
          make_latest: true
