name: Sync Latest Xray, Realm, and Sing-box Binaries

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

permissions:
  contents: write # Needed for creating/updating GitHub releases

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create Temp Distribution Directory
        run: |
          mkdir -p "${RUNNER_TEMP}/bin_dist" "${RUNNER_TEMP}/xray_extract_amd64" "${RUNNER_TEMP}/xray_extract_arm64" "${RUNNER_TEMP}/realm_extract" "${RUNNER_TEMP}/singbox_extract"

      - name: Get Upstream Version and Download Artifacts
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # 1) Query latest upstream tag from XTLS/Xray-core
          upstream_tag="$(curl -fsSL https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r '.tag_name')"
          echo "upstream_tag=${upstream_tag}" >> "$GITHUB_OUTPUT"

          # 2) Download and extract upstream binaries/geodata to temp dirs
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip -d "${RUNNER_TEMP}/xray_extract_amd64"
          cp "${RUNNER_TEMP}/xray_extract_amd64"/xray "${RUNNER_TEMP}/bin_dist"/xray_amd64
          cp "${RUNNER_TEMP}/xray_extract_amd64"/geoip.dat "${RUNNER_TEMP}/bin_dist"/geoip.dat
          cp "${RUNNER_TEMP}/xray_extract_amd64"/geosite.dat "${RUNNER_TEMP}/bin_dist"/geosite.dat

          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-arm64-v8a.zip
          unzip -o Xray-linux-arm64-v8a.zip -d "${RUNNER_TEMP}/xray_extract_arm64"
          cp "${RUNNER_TEMP}/xray_extract_arm64"/xray "${RUNNER_TEMP}/bin_dist"/xray_arm64

          # 3) Create deterministic checksums from extracted artifacts
          sha256sum "${RUNNER_TEMP}/bin_dist/xray_amd64" | awk '{print $1}' > "${RUNNER_TEMP}/sha_xray_amd64.txt"
          sha256sum "${RUNNER_TEMP}/bin_dist/xray_arm64" | awk '{print $1}' > "${RUNNER_TEMP}/sha_xray_arm64.txt"
          sha256sum "${RUNNER_TEMP}/bin_dist/geoip.dat" | awk '{print $1}' > "${RUNNER_TEMP}/sha_geoip.txt"
          sha256sum "${RUNNER_TEMP}/bin_dist/geosite.dat" | awk '{print $1}' > "${RUNNER_TEMP}/sha_geosite.txt"

          echo "sha_xray_amd64=$(cat "${RUNNER_TEMP}/sha_xray_amd64.txt")" >> "$GITHUB_OUTPUT"
          echo "sha_xray_arm64=$(cat "${RUNNER_TEMP}/sha_xray_arm64.txt")" >> "$GITHUB_OUTPUT"
          echo "sha_geoip=$(cat "${RUNNER_TEMP}/sha_geoip.txt")" >> "$GITHUB_OUTPUT"
          echo "sha_geosite=$(cat "${RUNNER_TEMP}/sha_geosite.txt")" >> "$GITHUB_OUTPUT"

          # 4) Download and extract realm binary from zhboner/realm
          realm_tag="$(curl -fsSL https://api.github.com/repos/zhboner/realm/releases/latest | jq -r '.tag_name')"
          echo "realm_tag=${realm_tag}" >> "$GITHUB_OUTPUT"

          wget -q "https://github.com/zhboner/realm/releases/latest/download/realm-x86_64-unknown-linux-gnu.tar.gz" -O "${RUNNER_TEMP}/realm_amd64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/realm_amd64.tar.gz" -C "${RUNNER_TEMP}/realm_extract"
          cp "${RUNNER_TEMP}/realm_extract"/realm "${RUNNER_TEMP}/bin_dist"/realm_amd64

          wget -q "https://github.com/zhboner/realm/releases/latest/download/realm-aarch64-unknown-linux-gnu.tar.gz" -O "${RUNNER_TEMP}/realm_arm64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/realm_arm64.tar.gz" -C "${RUNNER_TEMP}/realm_extract"
          cp "${RUNNER_TEMP}/realm_extract"/realm "${RUNNER_TEMP}/bin_dist"/realm_arm64

          # Download musl realm binaries (for Alpine/musl systems)
          wget -q "https://github.com/zhboner/realm/releases/latest/download/realm-x86_64-unknown-linux-musl.tar.gz" -O "${RUNNER_TEMP}/realm_musl_amd64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/realm_musl_amd64.tar.gz" -C "${RUNNER_TEMP}/realm_extract"
          cp "${RUNNER_TEMP}/realm_extract"/realm "${RUNNER_TEMP}/bin_dist"/realm_musl_amd64

          wget -q "https://github.com/zhboner/realm/releases/latest/download/realm-aarch64-unknown-linux-musl.tar.gz" -O "${RUNNER_TEMP}/realm_musl_arm64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/realm_musl_arm64.tar.gz" -C "${RUNNER_TEMP}/realm_extract"
          cp "${RUNNER_TEMP}/realm_extract"/realm "${RUNNER_TEMP}/bin_dist"/realm_musl_arm64

          # 5) Create deterministic checksums from realm binaries
          sha256sum "${RUNNER_TEMP}/bin_dist/realm_amd64" | awk '{print $1}' > "${RUNNER_TEMP}/sha_realm_amd64.txt"
          sha256sum "${RUNNER_TEMP}/bin_dist/realm_arm64" | awk '{print $1}' > "${RUNNER_TEMP}/sha_realm_arm64.txt"
          sha256sum "${RUNNER_TEMP}/bin_dist/realm_musl_amd64" | awk '{print $1}' > "${RUNNER_TEMP}/sha_realm_musl_amd64.txt"
          sha256sum "${RUNNER_TEMP}/bin_dist/realm_musl_arm64" | awk '{print $1}' > "${RUNNER_TEMP}/sha_realm_musl_arm64.txt"

          echo "sha_realm_amd64=$(cat "${RUNNER_TEMP}/sha_realm_amd64.txt")" >> "$GITHUB_OUTPUT"
          echo "sha_realm_arm64=$(cat "${RUNNER_TEMP}/sha_realm_arm64.txt")" >> "$GITHUB_OUTPUT"
          echo "sha_realm_musl_amd64=$(cat "${RUNNER_TEMP}/sha_realm_musl_amd64.txt")" >> "$GITHUB_OUTPUT"
          echo "sha_realm_musl_arm64=$(cat "${RUNNER_TEMP}/sha_realm_musl_arm64.txt")" >> "$GITHUB_OUTPUT"

          # 6) Download and extract sing-box binary from SagerNet/sing-box
          singbox_tag="$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.tag_name')"
          echo "singbox_tag=${singbox_tag}" >> "$GITHUB_OUTPUT"
          echo "Sing-box upstream tag: ${singbox_tag}"

          wget -q "https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-${singbox_tag#v}-linux-amd64.tar.gz" -O "${RUNNER_TEMP}/singbox_amd64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/singbox_amd64.tar.gz" -C "${RUNNER_TEMP}/singbox_extract"
          cp "${RUNNER_TEMP}/singbox_extract"/sing-box "${RUNNER_TEMP}/bin_dist"/sing-box_amd64

          wget -q "https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-${singbox_tag#v}-linux-arm64.tar.gz" -O "${RUNNER_TEMP}/singbox_arm64.tar.gz"
          tar -xzf "${RUNNER_TEMP}/singbox_arm64.tar.gz" -C "${RUNNER_TEMP}/singbox_extract"
          cp "${RUNNER_TEMP}/singbox_extract"/sing-box "${RUNNER_TEMP}/bin_dist"/sing-box_arm64

          # 7) Create deterministic checksums from sing-box binaries
          sha256sum "${RUNNER_TEMP}/bin_dist/sing-box_amd64" | awk '{print $1}' > "${RUNNER_TEMP}/sha_singbox_amd64.txt"
          sha256sum "${RUNNER_TEMP}/bin_dist/sing-box_arm64" | awk '{print $1}' > "${RUNNER_TEMP}/sha_singbox_arm64.txt"

          echo "sha_singbox_amd64=$(cat "${RUNNER_TEMP}/sha_singbox_amd64.txt")" >> "$GITHUB_OUTPUT"
          echo "sha_singbox_arm64=$(cat "${RUNNER_TEMP}/sha_singbox_arm64.txt")" >> "$GITHUB_OUTPUT"

      - name: Compare With Current Latest Release
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          release_json="$(curl -sSL https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest || true)"
          current_body="$(printf '%s' "${release_json}" | jq -r '.body // ""' 2>/dev/null || true)"
          current_tag="$(printf '%s\n' "${current_body}" | grep '^Upstream-Tag:' | sed -E 's/^Upstream-Tag:[[:space:]]*//' || true)"
          current_realm_tag="$(printf '%s\n' "${current_body}" | grep '^Realm-Upstream-Tag:' | sed -E 's/^Realm-Upstream-Tag:[[:space:]]*//' || true)"
          current_sha_xray_amd64="$(printf '%s\n' "${current_body}" | grep '^SHA256-xray_amd64:' | sed -E 's/^SHA256-xray_amd64:[[:space:]]*//' || true)"
          current_sha_xray_arm64="$(printf '%s\n' "${current_body}" | grep '^SHA256-xray_arm64:' | sed -E 's/^SHA256-xray_arm64:[[:space:]]*//' || true)"
          current_sha_geoip="$(printf '%s\n' "${current_body}" | grep '^SHA256-geoip.dat:' | sed -E 's/^SHA256-geoip.dat:[[:space:]]*//' || true)"
          current_sha_geosite="$(printf '%s\n' "${current_body}" | grep '^SHA256-geosite.dat:' | sed -E 's/^SHA256-geosite.dat:[[:space:]]*//' || true)"
          current_sha_realm_amd64="$(printf '%s\n' "${current_body}" | grep '^SHA256-realm_amd64:' | sed -E 's/^SHA256-realm_amd64:[[:space:]]*//' || true)"
          current_sha_realm_arm64="$(printf '%s\n' "${current_body}" | grep '^SHA256-realm_arm64:' | sed -E 's/^SHA256-realm_arm64:[[:space:]]*//' || true)"
          current_sha_realm_musl_amd64="$(printf '%s\n' "${current_body}" | grep '^SHA256-realm_musl_amd64:' | sed -E 's/^SHA256-realm_musl_amd64:[[:space:]]*//' || true)"
          current_sha_realm_musl_arm64="$(printf '%s\n' "${current_body}" | grep '^SHA256-realm_musl_arm64:' | sed -E 's/^SHA256-realm_musl_arm64:[[:space:]]*//' || true)"
          current_sha_singbox_amd64="$(printf '%s\n' "${current_body}" | grep '^SHA256-sing-box_amd64:' | sed -E 's/^SHA256-sing-box_amd64:[[:space:]]*//' || true)"
          current_sha_singbox_arm64="$(printf '%s\n' "${current_body}" | grep '^SHA256-sing-box_arm64:' | sed -E 's/^SHA256-sing-box_arm64:[[:space:]]*//' || true)"
          current_singbox_tag="$(printf '%s\n' "${current_body}" | grep '^Sing-box-Upstream-Tag:' | sed -E 's/^Sing-box-Upstream-Tag:[[:space:]]*//' || true)"

          changed="false"
          if [ "${current_tag}" != "${{ steps.upstream.outputs.upstream_tag }}" ]; then
            changed="true"
          fi
          if [ "${current_realm_tag}" != "${{ steps.upstream.outputs.realm_tag }}" ]; then
            changed="true"
          fi
          if [ "${current_sha_xray_amd64}" != "${{ steps.upstream.outputs.sha_xray_amd64 }}" ]; then
            changed="true"
          fi
          if [ "${current_sha_xray_arm64}" != "${{ steps.upstream.outputs.sha_xray_arm64 }}" ]; then
            changed="true"
          fi
          if [ "${current_sha_geoip}" != "${{ steps.upstream.outputs.sha_geoip }}" ]; then
            changed="true"
          fi
          if [ "${current_sha_geosite}" != "${{ steps.upstream.outputs.sha_geosite }}" ]; then
            changed="true"
          fi
          if [ "${current_sha_realm_amd64}" != "${{ steps.upstream.outputs.sha_realm_amd64 }}" ]; then
            changed="true"
          fi
          if [ "${current_sha_realm_arm64}" != "${{ steps.upstream.outputs.sha_realm_arm64 }}" ]; then
            changed="true"
          fi
          if [ "${current_sha_realm_musl_amd64}" != "${{ steps.upstream.outputs.sha_realm_musl_amd64 }}" ]; then
            changed="true"
          fi
          if [ "${current_sha_realm_musl_arm64}" != "${{ steps.upstream.outputs.sha_realm_musl_arm64 }}" ]; then
            changed="true"
          fi
          if [ "${current_singbox_tag}" != "${{ steps.upstream.outputs.singbox_tag }}" ]; then
            changed="true"
          fi
          if [ "${current_sha_singbox_amd64}" != "${{ steps.upstream.outputs.sha_singbox_amd64 }}" ]; then
            changed="true"
          fi
          if [ "${current_sha_singbox_arm64}" != "${{ steps.upstream.outputs.sha_singbox_arm64 }}" ]; then
            changed="true"
          fi

          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          echo "Current tag: ${current_tag:-<none>}"
          echo "Upstream tag: ${{ steps.upstream.outputs.upstream_tag }}"
          echo "Artifacts changed: ${changed}"

      - name: Stop if no changes
        if: steps.compare.outputs.changed != 'true'
        run: |
          echo "No upstream changes detected. Skip release update."

      - name: Release and Upload
        if: steps.compare.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.upstream.outputs.upstream_tag }}-${{ steps.upstream.outputs.realm_tag }}-${{ steps.upstream.outputs.singbox_tag }}
          name: xray ${{ steps.upstream.outputs.upstream_tag }} realm ${{ steps.upstream.outputs.realm_tag }} sing-box ${{ steps.upstream.outputs.singbox_tag }}
          body: |
            Automatic sync with latest Xray-core release.
            Upstream-Tag: ${{ steps.upstream.outputs.upstream_tag }}
            SHA256-xray_amd64: ${{ steps.upstream.outputs.sha_xray_amd64 }}
            SHA256-xray_arm64: ${{ steps.upstream.outputs.sha_xray_arm64 }}
            SHA256-geoip.dat: ${{ steps.upstream.outputs.sha_geoip }}
            SHA256-geosite.dat: ${{ steps.upstream.outputs.sha_geosite }}
            Realm-Upstream-Tag: ${{ steps.upstream.outputs.realm_tag }}
            SHA256-realm_amd64: ${{ steps.upstream.outputs.sha_realm_amd64 }}
            SHA256-realm_arm64: ${{ steps.upstream.outputs.sha_realm_arm64 }}
            SHA256-realm_musl_amd64: ${{ steps.upstream.outputs.sha_realm_musl_amd64 }}
            SHA256-realm_musl_arm64: ${{ steps.upstream.outputs.sha_realm_musl_arm64 }}
            Sing-box-Upstream-Tag: ${{ steps.upstream.outputs.singbox_tag }}
            SHA256-sing-box_amd64: ${{ steps.upstream.outputs.sha_singbox_amd64 }}
            SHA256-sing-box_arm64: ${{ steps.upstream.outputs.sha_singbox_arm64 }}
          files: |
            ${{ runner.temp }}/bin_dist/xray*
            ${{ runner.temp }}/bin_dist/geo*.dat
            ${{ runner.temp }}/bin_dist/realm*
            ${{ runner.temp }}/bin_dist/sing-box*
            
          fail_on_unmatched_files: true
          make_latest: true
